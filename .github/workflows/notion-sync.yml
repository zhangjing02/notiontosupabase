name: Notion to Supabase Scheduled Sync

on:
  schedule:
    # 页面级同步：每天 00:00 UTC（北京时间 08:00）
    - cron: '0 0 * * *'
    # 块级同步：每天 00:30 UTC（北京时间 08:30）
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: Sync target to run
        required: true
        default: both
        type: choice
        options:
          - page_sync
          - block_sync
          - both

permissions:
  contents: read

concurrency:
  group: notion-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  page_sync:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'page_sync' || github.event.inputs.target == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Page Sync Engine
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python ingest_notion.py

  block_sync:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'block_sync' || github.event.inputs.target == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Block Sync Engine
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ENABLE_BLOCK_CLASSIFICATION: "false"
        run: python incremental_sync.py
